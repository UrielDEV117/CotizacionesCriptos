<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Precios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-grafica">

    <header class="header-grafica">
        <a href="index.html" class="boton-volver">← Volver</a>
        <h1 id="cargando-grafica" class="titulo">Cargando Gráfica...</h1>
    </header>
    
    <h2 id="titulo-par" style="color: #fff; text-align: center; margin-top: 10px;"></h2>
    <div id="info-localizacion" style="text-align: center; color: #888; font-size: 0.9rem;"></div>
    
    <div id="info-precios" style="text-align: center; margin: 20px 0; min-height: 40px;"></div>

    <div class="controles-tiempo">
        <button onclick="cambiarTimeframe('15m')">15m</button>
        <button onclick="cambiarTimeframe('1h')">1h</button>
        <button onclick="cambiarTimeframe('4h')">4h</button>
        <button onclick="cambiarTimeframe('1d')">1d</button>
    </div>
    
    <div id="timer" style="text-align: center; color: #666; font-family: monospace; margin-bottom: 10px;"></div>

    <div class="contenedor-grafica">
        <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="grafica.js"></script>
</body>
</html>
