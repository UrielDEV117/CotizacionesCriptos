<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Precios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="pagina-grafica">

    <h1 id="grafica-titulo" class="titulo">Cargando Gráfica...</h1>
    
    <div class="controles-tiempo">
        <button onclick="cambiarTimeframe('15m')">15m</button>
        <button onclick="cambiarTimeframe('1h')">1h</button>
        <button onclick="cambiarTimeframe('4h')">4h</button>
        <button onclick="cambiarTimeframe('1d')">1d</button>
    </div>

    <div id="timer">Cargando tiempo...</div>

    <div class="contenedor-grafica">
        <canvas id="myChart"></canvas>
    </div>

    <a href="index.html" class="boton-volver">← Volver al Panel</a>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="grafica.js"></script>
</body>
</html>
