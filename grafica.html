<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Historial de Precios</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="grafica-titulo" class="titulo">Cargando Gráfica...</h1>
    
    <div class="controles-tiempo">

        <button onclick="cambiarTimeframe('1d')">1d</button>
    </div>

    <div id="timer">Cargando tiempo...</div>

    <a href="index.html" class="cambio positivo" style="text-decoration: none; display: block; text-align: center; margin-top: 10px;">← Volver al Panel</a>

    <div style="position: relative; height: 400px; width: 100%; margin-top: 20px;">
        <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="grafica.js"></script>

</html>
